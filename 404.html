<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Ghillie</title>

  <meta name="description" content="The page you're looking for doesn't exist. Return to Ghillie's homepage.">
  <meta name="robots" content="noindex, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ghillie">
  <meta property="og:url" content="https://ghillie.xyz/404">
  <meta property="og:title" content="Page Not Found | Ghillie">
  <meta property="og:description" content="The page you're looking for doesn't exist.">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta property="twitter:domain" content="ghillie.xyz">
  <meta name="twitter:title" content="Page Not Found | Ghillie">
  <meta name="twitter:description" content="The page you're looking for doesn't exist.">

  <!-- Styles & Favicon -->
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/404.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="shortcut icon" type="image/png" href="/assets/img/favicon.png">
</head>

<body class="tool-page" data-view="cover" ondragstart="return false">

  <!-- Single, descriptive H1 for crawlers / screen readers. -->
  <h1 class="visually-hidden">404 — Page not found</h1>

  <!-- Galaxy backdrop wash; the stars are a 3D dome inside the bubble canvas. -->
  <div class="galaxy" aria-hidden="true"></div>

  <!-- The same persistent live bubble as the homepage, but its wordmark reads
       "ERROR 404" instead of GHILLIE (see bubble-demo.js data-title). -->
  <div id="bubble-stage" aria-hidden="true" data-title="ERROR 404"></div>

  <!-- Shared VOL.01 chrome (from theme.css). -->
  <div class="grain" aria-hidden="true"></div>
  <div class="vhs" aria-hidden="true"></div>
  <div class="crop" aria-hidden="true">
    <i class="c tl"></i><i class="c tr"></i><i class="c bl"></i><i class="c br"></i>
  </div>
  <span class="meta meta-tl" aria-hidden="true">GHILLIE.XYZ</span>
  <span class="meta meta-tr" aria-hidden="true">EST. 2016 / SCOTLAND</span>
  <span class="meta meta-bl" aria-hidden="true">DIGITAL DESIGNER / DEVELOPER</span>
  <span class="meta meta-br" aria-hidden="true">ERROR 404</span>

  <!-- Not-found message, low on the page so it clears the GHILLIE wordmark. -->
  <main class="nf">
    <p class="nf-msg">Looks like a dead end.</p>
    <a class="nf-home" href="/">Return home</a>
  </main>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/assets/js/bubble-demo.js"></script>
  <!-- bubble-demo's router sets document.title to the homepage's; keep ours. -->
  <script type="module">
    document.title = "Page Not Found | Ghillie";
  </script>
</body>
</html>
