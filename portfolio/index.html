<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic HTML Meta Tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Thumbnail Portfolio by Ghillie</title>

  <meta name="description"
        content="Browse Ghillie's YouTube thumbnail portfolio: designs for Daily Dose of Internet, Daily Dose of Pets, JustRolledIn, Connor Eats Pants, and more. Hundreds of thumbnails, billions of views.">
  <link rel="canonical" href="https://ghillie.xyz/portfolio/">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ghillie">
  <meta property="og:url" content="https://ghillie.xyz/portfolio/">
  <meta property="og:title" content="YouTube Thumbnail Portfolio | Ghillie">
  <meta property="og:description"
        content="YouTube thumbnail design for some of the platform's biggest creators, by Ghillie, a digital designer from Scotland.">
  <meta property="og:image"
        content="https://ghillie.xyz/assets/img/metaImgs/Meta-Portfolio.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta property="twitter:domain" content="ghillie.xyz">
  <meta property="twitter:url" content="https://ghillie.xyz/portfolio/">
  <meta name="twitter:title" content="YouTube Thumbnail Portfolio | Ghillie">
  <meta name="twitter:description"
        content="YouTube thumbnail design for some of the platform's biggest creators, by Ghillie, a digital designer from Scotland.">
  <meta name="twitter:image"
        content="https://ghillie.xyz/assets/img/metaImgs/Meta-Portfolio.png">

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "CollectionPage",
        "name": "YouTube Thumbnail Portfolio by Ghillie",
        "description": "Portfolio of YouTube thumbnails by Ghillie, including work for Daily Dose of Internet, Daily Dose of Pets, JustRolledIn, and Connor Eats Pants.",
        "url": "https://ghillie.xyz/portfolio/",
        "author": { "@id": "https://ghillie.xyz/#person" },
        "creator": { "@id": "https://ghillie.xyz/#person" },
        "about": [
          { "@type": "Thing", "name": "YouTube Thumbnail Design" }
        ],
        "keywords": "YouTube thumbnails, thumbnail design, portfolio, graphic design, Daily Dose of Internet thumbnails, YouTube thumbnail designer"
      },
      {
        "@type": "Person",
        "@id": "https://ghillie.xyz/#person",
        "name": "Ghillie",
        "url": "https://ghillie.xyz/",
        "sameAs": [
          "https://github.com/Ghilliexyz",
          "https://twitter.com/Ghilliexyz",
          "https://discord.com/users/211851747688185856",
          "https://ghilliexyz.itch.io/",
          "https://www.spigotmc.org/resources/authors/ghilliexyz.1828307/",
          "https://buymeacoffee.com/ghillie"
        ]
      },
      {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://ghillie.xyz/" },
          { "@type": "ListItem", "position": 2, "name": "Portfolio", "item": "https://ghillie.xyz/portfolio/" }
        ]
      }
    ]
  }
  </script>

  <!-- Styles & Favicon -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
        crossorigin="anonymous">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/theme.css">
  <link rel="stylesheet" href="/assets/css/portfolio.css">
  <link rel="stylesheet" href="/assets/css/divider.css">
  <link rel="shortcut icon" type="image/png" href="/assets/img/favicon.png">
  <!-- Hold the first render (and the view-transition snapshot) until the hero
       is parsed, so the cross-fade doesn't reveal a half-built page. -->
  <link rel="expect" href="#vt-ready" blocking="render">
</head>

<body class="tool-page" ondragstart="return false">

    <!-- Film grain + CRT vignette + album-jacket framing (shared VOL.01 chrome) -->
    <div class="grain" aria-hidden="true"></div>
    <div class="vhs" aria-hidden="true"></div>
    <div class="crop" aria-hidden="true">
      <i class="c tl"></i><i class="c tr"></i><i class="c bl"></i><i class="c br"></i>
    </div>
    <span class="meta meta-tl" aria-hidden="true">GHILLIE.XYZ</span>
    <span class="meta meta-tr" aria-hidden="true">EST. 2016 / SCOTLAND</span>
    <span class="meta meta-bl" aria-hidden="true">DIGITAL DESIGNER / DEVELOPER</span>
    <span class="meta meta-br" aria-hidden="true">PORTFOLIO</span>

    <!-- Navbar -->
    <nav class="tool-nav" aria-label="Primary">
        <a href="/#about">ABOUT</a>
        <a href="/">HOME</a>
        <a href="/#portfolio" class="active">PORTFOLIO</a>
    </nav>

    <!-- Page Hero -->
    <div class="portfolio-hero" id="vt-ready">
        <h1>PORTFOLIO</h1>
        <p class="portfolio-tagline">YouTube thumbnail design for some of the platform's biggest creators. Hundreds of thumbnails, billions of views.</p>
    </div>

    <!-- Thumbnail Gallery -->
    <section id="tab-design" class="tab-content active">
        <!-- Creator Filter Pills -->
        <div class="filter-pills" id="filter-pills"></div>

        <!-- Thumbnail Gallery -->
        <div class="gallery-grid" id="gallery-grid"></div>

        <!-- Load More (for "All" view) -->
        <div class="load-more-wrap" id="load-more-wrap" style="display: none;">
            <span class="gallery-count" id="gallery-count"></span>
            <button class="load-more-btn" id="load-more-btn">Load More</button>
        </div>
    </section>

    <!-- Footer -->
    <div class="footer">
        <ul>
            <li><a href="https://github.com/Ghilliexyz" target="_blank" rel="noopener noreferrer">GITHUB</a></li>
            <li><a href="https://discord.com/users/211851747688185856" target="_blank" rel="noopener noreferrer">DISCORD</a></li>
            <li><a href="https://twitter.com/Ghilliexyz" target="_blank" rel="noopener noreferrer">TWITTER</a></li>
            <li><a href="https://buymeacoffee.com/ghillie" target="_blank" rel="noopener noreferrer">BUY ME A COFFEE</a></li>
        </ul>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-overlay"></div>
        <button class="lightbox-close" aria-label="Close">&times;</button>
        <button class="lightbox-prev" aria-label="Previous">&lsaquo;</button>
        <button class="lightbox-next" aria-label="Next">&rsaquo;</button>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div class="lightbox-info">
                <span class="lightbox-title" id="lightbox-title"></span>
                <span class="lightbox-views" id="lightbox-views"></span>
                <a class="lightbox-link" id="lightbox-link" href="#" target="_blank" rel="noopener noreferrer">Watch Video</a>
            </div>
        </div>
    </div>

    <script src="/assets/js/portfolio-data.js"></script>
    <script src="/assets/js/portfolio.js"></script>
</body>

</html>
